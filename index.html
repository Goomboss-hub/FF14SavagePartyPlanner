<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIV Party Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0D1B2A;
    --navy-mid:   #112236;
    --navy-light: #1A3354;
    --gold:       #C8A96E;
    --gold-dim:   #8A7048;
    --gold-bright:#E8C87E;
    --parchment:  #F0E6C8;
    --text:       #D4C9A8;
    --text-dim:   #7A8FA6;
    --tank:       #6FA8DC;
    --tank-dark:  #2A5C8A;
    --phealer:    #93C47D;
    --phealer-dark:#3A6B2A;
    --bhealer:    #6AA84F;
    --bhealer-dark:#2A5A1A;
    --melee:      #E06666;
    --melee-dark: #8A1A1A;
    --ranged:     #F6B26B;
    --ranged-dark:#8A5A1A;
    --magical:    #D5A6BD;
    --magical-dark:#6A2A4A;
    --error:      #CC3333;
    --warn:       #C8860A;
    --success:    #2A7A3A;
    --border:     rgba(200,169,110,0.2);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, #060E18 0%, var(--navy-mid) 100%);
    border-bottom: 1px solid var(--gold-dim);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-emblem {
    width: 48px; height: 48px;
    background: radial-gradient(circle, var(--gold) 0%, var(--gold-dim) 60%, transparent 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(200,169,110,0.3);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(200,169,110,0.4);
  }
  header p {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  /* ── Party Slots Visualizer ── */
  .party-visualizer {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .party-visualizer-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .party-slots {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .party-slot {
    flex: 1;
    height: 36px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--navy);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: transparent;
    overflow: hidden;
    white-space: nowrap;
  }
  .party-slot.filled {
    color: rgba(0,0,0,0.7);
    border-color: transparent;
  }
  .party-slot.filled span { display: block; font-size: 9px; text-align: center; padding: 0 2px; }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 130px);
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--navy-mid);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h2 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .player-count {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    color: var(--gold-dim);
  }
  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-track { background: transparent; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* ── Player Cards ── */
  .player-card {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .player-card:hover { border-color: var(--gold-dim); }
  .player-card-header {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    cursor: pointer;
  }
  .player-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--navy-light);
    border: 1px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .player-name-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    outline: none;
    cursor: text;
  }
  .player-name-input::placeholder { color: var(--text-dim); font-weight: 400; }
  .prog-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .prog-badge.progression {
    background: rgba(200,169,110,0.15);
    color: var(--gold);
    border: 1px solid var(--gold-dim);
  }
  .prog-badge.helper {
    background: var(--navy-light);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .weight-input {
    width: 36px;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-size: 12px;
    text-align: center;
    padding: 2px 4px;
    outline: none;
  }
  .weight-input:focus { border-color: var(--gold-dim); }
  .remove-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.2s;
  }
  .remove-btn:hover { color: var(--error); }

  .player-roles {
    padding: 0 12px 10px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .role-chip {
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .role-chip.inactive {
    background: var(--navy-light);
    color: var(--text-dim);
    border-color: var(--border);
  }
  .role-chip.tank.active      { background: var(--tank-dark); color: var(--tank); border-color: var(--tank); }
  .role-chip.purehealer.active  { background: var(--phealer-dark); color: var(--phealer); border-color: var(--phealer); }
  .role-chip.barrierhealer.active { background: var(--bhealer-dark); color: var(--bhealer); border-color: var(--bhealer); }
  .role-chip.melee.active     { background: var(--melee-dark); color: var(--melee); border-color: var(--melee); }
  .role-chip.ranged.active    { background: var(--ranged-dark); color: var(--ranged); border-color: var(--ranged); }
  .role-chip.magical.active   { background: var(--magical-dark); color: var(--magical); border-color: var(--magical); }

  /* ── Add Player / Controls ── */
  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--navy);
  }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); box-shadow: 0 0 16px rgba(200,169,110,0.4); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-outline:hover { border-color: var(--gold-dim); color: var(--text); }
  .btn-primary {
    background: linear-gradient(135deg, #1A4A2A, #2A7A3A);
    color: #7AE890;
    border: 1px solid #2A7A3A;
    font-size: 13px;
    padding: 11px 16px;
  }
  .btn-primary:hover { background: linear-gradient(135deg, #2A6A3A, #3A9A4A); box-shadow: 0 0 16px rgba(42,122,58,0.4); }

  /* ── Main Panel ── */
  .main {
    padding: 24px 28px;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state h3 { font-family: 'Cinzel', serif; color: var(--gold-dim); font-size: 16px; }
  .empty-state p { font-size: 13px; max-width: 280px; line-height: 1.6; }

  /* ── Results ── */
  .result-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-title.success { color: #7AE890; }
  .result-title.failure { color: #FF6B6B; }

  .party-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 28px;
  }
  .party-table th {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .party-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(200,169,110,0.07);
  }
  .party-table tr:last-child td { border-bottom: none; }
  .role-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .role-pill.tank       { background: var(--tank-dark); color: var(--tank); }
  .role-pill.purehealer   { background: var(--phealer-dark); color: var(--phealer); }
  .role-pill.barrierhealer { background: var(--bhealer-dark); color: var(--bhealer); }
  .role-pill.melee      { background: var(--melee-dark); color: var(--melee); }
  .role-pill.ranged     { background: var(--ranged-dark); color: var(--ranged); }
  .role-pill.magical    { background: var(--magical-dark); color: var(--magical); }

  .prog-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(200,169,110,0.1);
    color: var(--gold);
    border: 1px solid var(--gold-dim);
  }
  .helper-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--navy-light);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  /* ── Diagnostics ── */
  .diag-section {
    margin-bottom: 24px;
  }
  .diag-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .diag-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .diag-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--navy);
    font-size: 12px;
  }
  .diag-row.ok { border-color: rgba(106,168,79,0.4); background: rgba(106,168,79,0.05); }
  .diag-row.fail { border-color: rgba(204,51,51,0.4); background: rgba(204,51,51,0.05); }
  .diag-row.warn { border-color: rgba(200,134,10,0.4); background: rgba(200,134,10,0.05); }
  .diag-label { color: var(--text); font-weight: 500; }
  .diag-val { font-weight: 600; }
  .diag-row.ok .diag-val { color: var(--phealer); }
  .diag-row.fail .diag-val { color: var(--error); }
  .diag-row.warn .diag-val { color: var(--ranged); }

  .swap-card {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
    transition: border-color 0.2s;
  }
  .swap-card:hover { border-color: var(--gold-dim); }
  .swap-out { color: var(--error); font-weight: 500; font-size: 13px; }
  .swap-arrow { color: var(--gold-dim); font-size: 16px; }
  .swap-in { color: #7AE890; font-weight: 500; font-size: 13px; }
  .swap-note { margin-left: auto; font-size: 11px; color: var(--text-dim); }
  .swap-prog { color: var(--gold); }

  .no-swaps {
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
    padding: 12px;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* ── Requirement chips ── */
  .req-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .req-chip {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .req-chip .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* ── Scrollbar ── */
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
    .party-visualizer { padding: 12px 16px; }
    header { padding: 14px 16px; }
    .main { padding: 16px; }
    .diag-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-emblem">⚔️</div>
  <div>
    <h1>FFXIV Party Builder</h1>
    <p>Assemble your light party · 8 members · Full composition required</p>
  </div>
</header>

<div class="party-visualizer">
  <span class="party-visualizer-label">Party</span>
  <div class="party-slots" id="partySlots">
    <!-- filled by JS -->
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Roster</h2>
      <span class="player-count" id="playerCount">0 players</span>
    </div>
    <div class="sidebar-body" id="rosterList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-outline" onclick="addPlayer()">＋ Add Player</button>
      <button class="btn btn-primary" onclick="buildParty()">⚔ Build Party</button>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="empty-state">
      <div class="icon">🛡️</div>
      <h3>No Party Assembled</h3>
      <p>Add players to the roster, mark their available roles and weight, then click Build Party.</p>
      <div class="req-bar" style="margin-top:8px; justify-content:center;">
        <div class="req-chip"><span class="dot" style="background:var(--tank)"></span>2 Tank</div>
        <div class="req-chip"><span class="dot" style="background:var(--phealer)"></span>1 Pure Healer</div>
        <div class="req-chip"><span class="dot" style="background:var(--bhealer)"></span>1 Barrier Healer</div>
        <div class="req-chip"><span class="dot" style="background:var(--melee)"></span>2 Melee</div>
        <div class="req-chip"><span class="dot" style="background:var(--ranged)"></span>1 Ranged</div>
        <div class="req-chip"><span class="dot" style="background:var(--magical)"></span>1 Magical</div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const ROLES = ['tank','purehealer','barrierhealer','melee','ranged','magical'];
const ROLE_LABELS = {
  tank:'Tank', purehealer:'Pure Healer', barrierhealer:'Barrier Healer',
  melee:'Melee', ranged:'Ranged', magical:'Magical'
};
const ROLE_SHORT = {
  tank:'TNK', purehealer:'PHeal', barrierhealer:'BHeal',
  melee:'MEL', ranged:'RNG', magical:'MGC'
};
const REQUIRED = { tank:2, purehealer:1, barrierhealer:1, melee:2, ranged:1, magical:1 };
const PARTY_SIZE = 8;

let players = [];
let nextId = 1;

function makePlayer() {
  return {
    id: nextId++,
    name: '',
    progression: false,
    weight: 1,
    tank: false, purehealer: false, barrierhealer: false,
    melee: false, ranged: false, magical: false
  };
}

// ── Roster UI ────────────────────────────────────────────────────────────────
function addPlayer() {
  const p = makePlayer();
  players.push(p);
  renderRoster();
  // focus the new name input
  setTimeout(() => {
    const input = document.querySelector(`[data-id="${p.id}"] .player-name-input`);
    if (input) input.focus();
  }, 50);
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  renderRoster();
  updateSlots([]);
}

function toggleRole(id, role) {
  const p = players.find(p => p.id === id);
  if (p) { p[role] = !p[role]; renderRoster(); }
}

function toggleProgression(id) {
  const p = players.find(p => p.id === id);
  if (p) { p.progression = !p.progression; renderRoster(); }
}

function renderRoster() {
  const list = document.getElementById('rosterList');
  const count = document.getElementById('playerCount');
  count.textContent = `${players.length} player${players.length !== 1 ? 's' : ''}`;

  if (players.length === 0) {
    list.innerHTML = `<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:24px 0;">No players yet.<br>Click Add Player to begin.</div>`;
    return;
  }

  list.innerHTML = players.map(p => `
    <div class="player-card" data-id="${p.id}">
      <div class="player-card-header">
        <div class="player-avatar">${p.name ? p.name[0].toUpperCase() : '?'}</div>
        <input
          class="player-name-input"
          placeholder="Player name…"
          value="${escHtml(p.name)}"
          onchange="updateName(${p.id}, this.value)"
          oninput="updateNameLive(${p.id}, this)"
        />
        <span
          class="prog-badge ${p.progression ? 'progression' : 'helper'}"
          onclick="toggleProgression(${p.id})"
          title="Click to toggle Progression / Helper"
        >${p.progression ? '⭐ Prog' : 'Helper'}</span>
        <input
          class="weight-input"
          type="number" min="0" max="99" value="${p.weight}"
          title="Weight (priority among helpers)"
          onchange="updateWeight(${p.id}, this.value)"
        />
        <button class="remove-btn" onclick="removePlayer(${p.id})" title="Remove player">×</button>
      </div>
      <div class="player-roles">
        ${ROLES.map(r => `
          <span
            class="role-chip ${r} ${p[r] ? 'active' : 'inactive'}"
            onclick="toggleRole(${p.id}, '${r}')"
          >${ROLE_LABELS[r]}</span>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function updateName(id, val) {
  const p = players.find(p => p.id === id);
  if (p) p.name = val.trim();
}
function updateNameLive(id, input) {
  const p = players.find(p => p.id === id);
  if (p) {
    p.name = input.value.trim();
    const avatar = input.closest('.player-card').querySelector('.player-avatar');
    avatar.textContent = p.name ? p.name[0].toUpperCase() : '?';
  }
}
function updateWeight(id, val) {
  const p = players.find(p => p.id === id);
  if (p) p.weight = Math.max(0, parseInt(val) || 0);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Party Slots Visualizer ────────────────────────────────────────────────────
const SLOT_COLORS = {
  tank: 'var(--tank)', purehealer: 'var(--phealer)', barrierhealer: 'var(--bhealer)',
  melee: 'var(--melee)', ranged: 'var(--ranged)', magical: 'var(--magical)'
};
const SLOT_TEXT_COLORS = {
  tank: 'var(--tank-dark)', purehealer: 'var(--phealer-dark)', barrierhealer: 'var(--bhealer-dark)',
  melee: 'var(--melee-dark)', ranged: 'var(--ranged-dark)', magical: 'var(--magical-dark)'
};

function updateSlots(party) {
  const container = document.getElementById('partySlots');
  container.innerHTML = Array.from({length: PARTY_SIZE}, (_, i) => {
    const entry = party[i];
    if (entry) {
      return `<div class="party-slot filled" style="background:${SLOT_COLORS[entry.role]};color:rgba(0,0,0,0.75);">
        <span>${escHtml(entry.player.name)}<br>${ROLE_SHORT[entry.role]}</span>
      </div>`;
    }
    return `<div class="party-slot"></div>`;
  }).join('');
}

// ── Party Building Algorithm ──────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function canBuildParty(pool) {
  let found = false;
  function search(i, count, counts) {
    if (found) return;
    if (count === PARTY_SIZE) { if (ROLES.every(r => counts[r] >= REQUIRED[r])) found = true; return; }
    if (i >= pool.length) return;
    if (pool.length - i < PARTY_SIZE - count) return;
    const p = pool[i];
    for (const r of ROLES.filter(r => p[r])) {
      counts[r]++;
      search(i + 1, count + 1, counts);
      counts[r]--;
      if (found) return;
    }
    search(i + 1, count, counts);
  }
  search(0, 0, {tank:0,purehealer:0,barrierhealer:0,melee:0,ranged:0,magical:0});
  return found;
}

function buildParty() {
  // Only use players with weight > 0
  let pool = players.filter(p => p.weight > 0 && p.name);
  if (pool.length === 0) {
    showError('No eligible players. Add players with a weight greater than 0.');
    return;
  }

  // Sort: Progression first, then by weight desc (shuffled within tiers)
  const progression = pool.filter(p => p.progression);
  const helpers = pool.filter(p => !p.progression);
  const groups = {};
  helpers.forEach(p => { if (!groups[p.weight]) groups[p.weight] = []; groups[p.weight].push(p); });
  Object.values(groups).forEach(g => shuffle(g));
  const sortedHelpers = Object.keys(groups).map(Number).sort((a,b)=>b-a).flatMap(w => groups[w]);
  pool = [...progression, ...sortedHelpers];

  let best = null;
  let bestPartial = null;
  let bestScore = -1;
  let nodes = 0;
  const NODE_LIMIT = 2000000;

  function score(counts) {
    return ROLES.reduce((s,r) => s + Math.min(counts[r], REQUIRED[r]), 0);
  }

  function search(i, chosen, counts) {
    if (best || nodes > NODE_LIMIT) return;
    nodes++;
    const sc = score(counts);
    if (sc > bestScore) { bestScore = sc; bestPartial = { counts:{...counts}, chosen:chosen.slice() }; }
    if (chosen.length === PARTY_SIZE) {
      if (ROLES.every(r => counts[r] >= REQUIRED[r])) best = chosen.slice();
      return;
    }
    if (i >= pool.length) return;
    if (pool.length - i < PARTY_SIZE - chosen.length) return;
    const p = pool[i];
    const eligible = shuffle(ROLES.filter(r => p[r]));
    for (const role of eligible) {
      chosen.push({player:p, role});
      counts[role]++;
      search(i + 1, chosen, counts);
      counts[role]--;
      chosen.pop();
      if (best) return;
    }
    search(i + 1, chosen, counts);
  }

  search(0, [], {tank:0,purehealer:0,barrierhealer:0,melee:0,ranged:0,magical:0});

  if (best) {
    updateSlots(best);
    showSuccess(best);
  } else {
    updateSlots([]);
    showFailure(pool, bestPartial);
  }
}

// ── Result Rendering ──────────────────────────────────────────────────────────
function showSuccess(party) {
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="result-title success">✦ Party Assembled</div>
    <table class="party-table">
      <thead>
        <tr>
          <th>Player</th>
          <th>Status</th>
          <th>Assigned Role</th>
        </tr>
      </thead>
      <tbody>
        ${party.map(e => `
          <tr>
            <td style="font-weight:500">${escHtml(e.player.name)}</td>
            <td>${e.player.progression
              ? '<span class="prog-tag">⭐ Progression</span>'
              : '<span class="helper-tag">Helper</span>'}</td>
            <td><span class="role-pill ${e.role}">${ROLE_LABELS[e.role]}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <button class="btn btn-outline" style="width:auto" onclick="buildParty()">🔀 Rebuild with different shuffle</button>
  `;
}

function showFailure(pool, bestPartial) {
  const fullRoster = players.filter(p => p.weight > 0 && p.name);
  const poolNames = new Set(pool.map(p => p.name));
  const bench = fullRoster.filter(p => !poolNames.has(p.name));

  // Find valid single swaps
  const swaps = [];
  if (bestPartial) {
    const chosenParty = bestPartial.chosen.map(e => e.player);
    const partyNames = new Set(chosenParty.map(p => p.name));
    const allBench = fullRoster.filter(p => !partyNames.has(p.name));
    const seen = new Set();
    for (const out of chosenParty) {
      const without = chosenParty.filter(p => p.name !== out.name);
      for (const inp of allBench) {
        if (canBuildParty([...without, inp])) {
          const key = `${out.name}→${inp.name}`;
          if (!seen.has(key)) {
            seen.add(key);
            swaps.push({ remove: out, add: inp });
          }
        }
      }
    }
  }

  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="result-title failure">✖ No Valid Party Found</div>

    <div class="diag-section">
      <h3>📋 Role Availability</h3>
      <div class="diag-grid">
        ${ROLES.map(r => {
          const count = pool.filter(p => p[r]).length;
          const ok = count >= REQUIRED[r];
          return `<div class="diag-row ${ok ? 'ok' : 'fail'}">
            <span class="diag-label">${ROLE_LABELS[r]}</span>
            <span class="diag-val">${count} / ${REQUIRED[r]} needed</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${bestPartial ? `
    <div class="diag-section">
      <h3>🎯 Closest Attempt <span style="font-weight:300;color:var(--text-dim);font-family:Inter,sans-serif;font-size:11px;">(${bestPartial.chosen.length}/${PARTY_SIZE} slots filled)</span></h3>
      <div class="diag-grid">
        ${ROLES.map(r => {
          const have = Math.min(bestPartial.counts[r], REQUIRED[r]);
          const need = REQUIRED[r];
          const short = need - have;
          const ok = short <= 0;
          return `<div class="diag-row ${ok ? 'ok' : 'warn'}">
            <span class="diag-label">${ROLE_LABELS[r]}</span>
            <span class="diag-val">${ok ? '✓ Filled' : `⚠ Short by ${short}`}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    ` : ''}

    <div class="diag-section">
      <h3>🔄 Substitutions That Would Fix This</h3>
      ${swaps.length === 0
        ? `<div class="no-swaps">No single-player substitution from the full roster can resolve this composition. Multiple roster changes may be needed.</div>`
        : swaps.map(s => `
          <div class="swap-card">
            <span class="swap-out">− ${escHtml(s.remove.name)}</span>
            <span class="swap-arrow">→</span>
            <span class="swap-in">+ ${escHtml(s.add.name)}</span>
            <span class="swap-note ${s.add.progression ? 'swap-prog' : ''}">${s.add.progression ? '⭐ Progression' : 'Helper'}</span>
          </div>
        `).join('')
      }
    </div>

    <button class="btn btn-outline" style="margin-top:8px" onclick="buildParty()">🔀 Try again</button>
  `;
}

function showError(msg) {
  document.getElementById('mainPanel').innerHTML = `
    <div class="result-title failure">✖ ${escHtml(msg)}</div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateSlots([]);
renderRoster();
</script>
