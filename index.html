<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIV Party Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="style.css">
</head>
<body>

<header>
  <div class="header-emblem">⚔️</div>
  <div>
    <h1>FFXIV Party Builder</h1>
    <p>Assemble your full party · 8 members · Full composition required</p>
  </div>
</header>

<div class="party-visualizer">
  <span class="party-visualizer-label">Party</span>
  <div class="party-slots" id="partySlots">
    <!-- filled by JS -->
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Roster</h2>
      <span class="player-count" id="playerCount">0 players</span>
    </div>
    <div class="sidebar-body" id="rosterList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-outline" onclick="addPlayer()">＋ Add Player</button>
      <button class="btn btn-primary" onclick="buildParty()">⚔ Build Party</button>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="empty-state">
      <div class="icon">🛡️</div>
      <h3>No Party Assembled</h3>
      <p>Add players to the roster, mark their available roles and weight, then click Build Party.</p>
      <div class="req-bar" style="margin-top:8px; justify-content:center;">
        <div class="req-chip"><span class="dot" style="background:var(--tank)"></span>2 Tank</div>
        <div class="req-chip"><span class="dot" style="background:var(--phealer)"></span>1 Pure Healer</div>
        <div class="req-chip"><span class="dot" style="background:var(--bhealer)"></span>1 Barrier Healer</div>
        <div class="req-chip"><span class="dot" style="background:var(--melee)"></span>2 Melee</div>
        <div class="req-chip"><span class="dot" style="background:var(--ranged)"></span>1 Ranged</div>
        <div class="req-chip"><span class="dot" style="background:var(--magical)"></span>1 Magical</div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const ROLES = ['tank','purehealer','barrierhealer','melee','ranged','magical'];
const ROLE_LABELS = {
  tank:'Tank', purehealer:'Pure Healer', barrierhealer:'Barrier Healer',
  melee:'Melee', ranged:'Ranged', magical:'Magical'
};
const ROLE_SHORT = {
  tank:'TNK', purehealer:'PHeal', barrierhealer:'BHeal',
  melee:'MEL', ranged:'RNG', magical:'MGC'
};
const REQUIRED = { tank:2, purehealer:1, barrierhealer:1, melee:2, ranged:1, magical:1 };
const PARTY_SIZE = 8;

let players = [];
let nextId = 1;

function makePlayer() {
  return {
    id: nextId++,
    name: '',
    progression: false,
    weight: 1,
    tank: false, purehealer: false, barrierhealer: false,
    melee: false, ranged: false, magical: false
  };
}

// ── Roster UI ────────────────────────────────────────────────────────────────
function addPlayer() {
  const p = makePlayer();
  players.push(p);
  renderRoster();
  // focus the new name input
  setTimeout(() => {
    const input = document.querySelector(`[data-id="${p.id}"] .player-name-input`);
    if (input) input.focus();
  }, 50);
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  renderRoster();
  updateSlots([]);
}

function toggleRole(id, role) {
  const p = players.find(p => p.id === id);
  if (p) { p[role] = !p[role]; renderRoster(); }
}

function toggleProgression(id) {
  const p = players.find(p => p.id === id);
  if (p) { p.progression = !p.progression; renderRoster(); }
}

function renderRoster() {
  const list = document.getElementById('rosterList');
  const count = document.getElementById('playerCount');
  count.textContent = `${players.length} player${players.length !== 1 ? 's' : ''}`;

  if (players.length === 0) {
    list.innerHTML = `<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:24px 0;">No players yet.<br>Click Add Player to begin.</div>`;
    return;
  }

  list.innerHTML = players.map(p => `
    <div class="player-card" data-id="${p.id}">
      <div class="player-card-header">
        <div class="player-avatar">${p.name ? p.name[0].toUpperCase() : '?'}</div>
        <input
          class="player-name-input"
          placeholder="Player name…"
          value="${escHtml(p.name)}"
          onchange="updateName(${p.id}, this.value)"
          oninput="updateNameLive(${p.id}, this)"
        />
        <span
          class="prog-badge ${p.progression ? 'progression' : 'helper'}"
          onclick="toggleProgression(${p.id})"
          title="Click to toggle Progression / Helper"
        >${p.progression ? '⭐ Prog' : 'Helper'}</span>
        <input
          class="weight-input"
          type="number" min="0" max="99" value="${p.weight}"
          title="Weight (priority among helpers)"
          onchange="updateWeight(${p.id}, this.value)"
        />
        <button class="remove-btn" onclick="removePlayer(${p.id})" title="Remove player">×</button>
      </div>
      <div class="player-roles">
        ${ROLES.map(r => `
          <span
            class="role-chip ${r} ${p[r] ? 'active' : 'inactive'}"
            onclick="toggleRole(${p.id}, '${r}')"
          >${ROLE_LABELS[r]}</span>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function updateName(id, val) {
  const p = players.find(p => p.id === id);
  if (p) p.name = val.trim();
}
function updateNameLive(id, input) {
  const p = players.find(p => p.id === id);
  if (p) {
    p.name = input.value.trim();
    const avatar = input.closest('.player-card').querySelector('.player-avatar');
    avatar.textContent = p.name ? p.name[0].toUpperCase() : '?';
  }
}
function updateWeight(id, val) {
  const p = players.find(p => p.id === id);
  if (p) p.weight = Math.max(0, parseInt(val) || 0);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Party Slots Visualizer ────────────────────────────────────────────────────
const SLOT_COLORS = {
  tank: 'var(--tank)', purehealer: 'var(--phealer)', barrierhealer: 'var(--bhealer)',
  melee: 'var(--melee)', ranged: 'var(--ranged)', magical: 'var(--magical)'
};
const SLOT_TEXT_COLORS = {
  tank: 'var(--tank-dark)', purehealer: 'var(--phealer-dark)', barrierhealer: 'var(--bhealer-dark)',
  melee: 'var(--melee-dark)', ranged: 'var(--ranged-dark)', magical: 'var(--magical-dark)'
};

function updateSlots(party) {
  const container = document.getElementById('partySlots');
  container.innerHTML = Array.from({length: PARTY_SIZE}, (_, i) => {
    const entry = party[i];
    if (entry) {
      return `<div class="party-slot filled" style="background:${SLOT_COLORS[entry.role]};color:rgba(0,0,0,0.75);">
        <span>${escHtml(entry.player.name)}<br>${ROLE_SHORT[entry.role]}</span>
      </div>`;
    }
    return `<div class="party-slot"></div>`;
  }).join('');
}

// ── Party Building Algorithm ──────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function canBuildParty(pool) {
  let found = false;
  function search(i, count, counts) {
    if (found) return;
    if (count === PARTY_SIZE) { if (ROLES.every(r => counts[r] >= REQUIRED[r])) found = true; return; }
    if (i >= pool.length) return;
    if (pool.length - i < PARTY_SIZE - count) return;
    const p = pool[i];
    for (const r of ROLES.filter(r => p[r])) {
      counts[r]++;
      search(i + 1, count + 1, counts);
      counts[r]--;
      if (found) return;
    }
    search(i + 1, count, counts);
  }
  search(0, 0, {tank:0,purehealer:0,barrierhealer:0,melee:0,ranged:0,magical:0});
  return found;
}

function buildParty() {
  // Only use players with weight > 0
  let pool = players.filter(p => p.weight > 0 && p.name);
  if (pool.length === 0) {
    showError('No eligible players. Add players with a weight greater than 0.');
    return;
  }

  // Sort: Progression first, then by weight desc (shuffled within tiers)
  const progression = pool.filter(p => p.progression);
  const helpers = pool.filter(p => !p.progression);
  const groups = {};
  helpers.forEach(p => { if (!groups[p.weight]) groups[p.weight] = []; groups[p.weight].push(p); });
  Object.values(groups).forEach(g => shuffle(g));
  const sortedHelpers = Object.keys(groups).map(Number).sort((a,b)=>b-a).flatMap(w => groups[w]);
  pool = [...progression, ...sortedHelpers];

  let best = null;
  let bestPartial = null;
  let bestScore = -1;
  let nodes = 0;
  const NODE_LIMIT = 2000000;

  function score(counts) {
    return ROLES.reduce((s,r) => s + Math.min(counts[r], REQUIRED[r]), 0);
  }

  function search(i, chosen, counts) {
    if (best || nodes > NODE_LIMIT) return;
    nodes++;
    const sc = score(counts);
    if (sc > bestScore) { bestScore = sc; bestPartial = { counts:{...counts}, chosen:chosen.slice() }; }
    if (chosen.length === PARTY_SIZE) {
      if (ROLES.every(r => counts[r] >= REQUIRED[r])) best = chosen.slice();
      return;
    }
    if (i >= pool.length) return;
    if (pool.length - i < PARTY_SIZE - chosen.length) return;
    const p = pool[i];
    const eligible = shuffle(ROLES.filter(r => p[r]));
    for (const role of eligible) {
      chosen.push({player:p, role});
      counts[role]++;
      search(i + 1, chosen, counts);
      counts[role]--;
      chosen.pop();
      if (best) return;
    }
    search(i + 1, chosen, counts);
  }

  search(0, [], {tank:0,purehealer:0,barrierhealer:0,melee:0,ranged:0,magical:0});

  if (best) {
    updateSlots(best);
    showSuccess(best);
  } else {
    updateSlots([]);
    showFailure(pool, bestPartial);
  }
}

// ── Result Rendering ──────────────────────────────────────────────────────────
function showSuccess(party) {
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="result-title success">✦ Party Assembled</div>
    <table class="party-table">
      <thead>
        <tr>
          <th>Player</th>
          <th>Status</th>
          <th>Assigned Role</th>
        </tr>
      </thead>
      <tbody>
        ${party.map(e => `
          <tr>
            <td style="font-weight:500">${escHtml(e.player.name)}</td>
            <td>${e.player.progression
              ? '<span class="prog-tag">⭐ Progression</span>'
              : '<span class="helper-tag">Helper</span>'}</td>
            <td><span class="role-pill ${e.role}">${ROLE_LABELS[e.role]}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <button class="btn btn-outline" style="width:auto" onclick="buildParty()">🔀 Rebuild with different shuffle</button>
  `;
}

function showFailure(pool, bestPartial) {
  const fullRoster = players.filter(p => p.weight > 0 && p.name);
  const poolNames = new Set(pool.map(p => p.name));
  const bench = fullRoster.filter(p => !poolNames.has(p.name));

  // Find valid single swaps
  const swaps = [];
  if (bestPartial) {
    const chosenParty = bestPartial.chosen.map(e => e.player);
    const partyNames = new Set(chosenParty.map(p => p.name));
    const allBench = fullRoster.filter(p => !partyNames.has(p.name));
    const seen = new Set();
    for (const out of chosenParty) {
      const without = chosenParty.filter(p => p.name !== out.name);
      for (const inp of allBench) {
        if (canBuildParty([...without, inp])) {
          const key = `${out.name}→${inp.name}`;
          if (!seen.has(key)) {
            seen.add(key);
            swaps.push({ remove: out, add: inp });
          }
        }
      }
    }
  }

  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="result-title failure">✖ No Valid Party Found</div>

    <div class="diag-section">
      <h3>📋 Role Availability</h3>
      <div class="diag-grid">
        ${ROLES.map(r => {
          const count = pool.filter(p => p[r]).length;
          const ok = count >= REQUIRED[r];
          return `<div class="diag-row ${ok ? 'ok' : 'fail'}">
            <span class="diag-label">${ROLE_LABELS[r]}</span>
            <span class="diag-val">${count} / ${REQUIRED[r]} needed</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${bestPartial ? `
    <div class="diag-section">
      <h3>🎯 Closest Attempt <span style="font-weight:300;color:var(--text-dim);font-family:Inter,sans-serif;font-size:11px;">(${bestPartial.chosen.length}/${PARTY_SIZE} slots filled)</span></h3>
      <div class="diag-grid">
        ${ROLES.map(r => {
          const have = Math.min(bestPartial.counts[r], REQUIRED[r]);
          const need = REQUIRED[r];
          const short = need - have;
          const ok = short <= 0;
          return `<div class="diag-row ${ok ? 'ok' : 'warn'}">
            <span class="diag-label">${ROLE_LABELS[r]}</span>
            <span class="diag-val">${ok ? '✓ Filled' : `⚠ Short by ${short}`}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    ` : ''}

    <div class="diag-section">
      <h3>🔄 Substitutions That Would Fix This</h3>
      ${swaps.length === 0
        ? `<div class="no-swaps">No single-player substitution from the full roster can resolve this composition. Multiple roster changes may be needed.</div>`
        : swaps.map(s => `
          <div class="swap-card">
            <span class="swap-out">− ${escHtml(s.remove.name)}</span>
            <span class="swap-arrow">→</span>
            <span class="swap-in">+ ${escHtml(s.add.name)}</span>
            <span class="swap-note ${s.add.progression ? 'swap-prog' : ''}">${s.add.progression ? '⭐ Progression' : 'Helper'}</span>
          </div>
        `).join('')
      }
    </div>

    <button class="btn btn-outline" style="margin-top:8px" onclick="buildParty()">🔀 Try again</button>
  `;
}

function showError(msg) {
  document.getElementById('mainPanel').innerHTML = `
    <div class="result-title failure">✖ ${escHtml(msg)}</div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateSlots([]);
renderRoster();
</script>
</body>
</html>
